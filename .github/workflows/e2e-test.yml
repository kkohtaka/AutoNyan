---
name: E2E Tests

run-name: E2E Tests - staging

on:
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip resource cleanup after test'
        required: false
        type: boolean
        default: false
  schedule:
    # Run E2E tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_run:
    workflows: ['Deploy']
    types:
      - completed
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      ENVIRONMENT: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Initialize Terraform backend
        run: npm run terraform:init
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_LOCATION: ${{ vars.TF_STATE_LOCATION }}

      - name: Set environment variables
        run: |
          echo "PROJECT_ID=$(gcloud config get-value project)" >> $GITHUB_ENV
          echo "DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}" >> $GITHUB_ENV
          echo "CATEGORY_ROOT_FOLDER_ID=${{ secrets.CATEGORY_ROOT_FOLDER_ID }}" >> $GITHUB_ENV
          echo "UNCATEGORIZED_FOLDER_ID=${{ secrets.UNCATEGORIZED_FOLDER_ID }}" >> $GITHUB_ENV

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Cleanup orphaned resources
        if: always() && !inputs.skip_cleanup
        run: npm run test:e2e:cleanup
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            tests/e2e/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logDir = 'tests/e2e/logs';

            let comment = '## E2E Test Results\n\n';

            if (fs.existsSync(logDir)) {
              const files = fs.readdirSync(logDir);
              if (files.length > 0) {
                comment += `✅ Tests completed. Logs available in workflow artifacts.\n`;
              } else {
                comment += `⚠️ No test logs found.\n`;
              }
            } else {
              comment += `❌ Test execution may have failed early.\n`;
            }

            comment += `\n**Environment:** staging\n`;
            comment += `**Workflow:** ${context.workflow}\n`;
            comment += `**Run:** [#${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
