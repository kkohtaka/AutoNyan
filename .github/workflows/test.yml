---
name: Test

run-name: |
  ${{
    github.event_name == 'pull_request' &&
    format('Test - PR #{0} ({1})', github.event.pull_request.number, github.event.pull_request.head.ref) ||
    github.event_name == 'push' &&
    format('Test - {0} ({1})', github.ref_name, github.sha) ||
    'Test'
  }}

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  checks: write
  contents: read
  pull-requests: read
  actions: write

# Cancel superseded runs to avoid piling up duplicate executions when a PR is
# updated repeatedly (synchronize). The group is scoped per workflow and ref so
# different PRs and the master branch never cancel each other. cancel-in-progress
# is enabled for pull_request events only: master pushes drive the deploy chain
# (terraform-plan -> build -> deploy) and must be allowed to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decide whether the heavy lint/test matrix needs to run. Code-unrelated PRs
  # (skills, docs, IDE config) skip the matrix to avoid wasteful CI, while the
  # required `test` check still reports success (see the `test` job below).
  #
  # Detection uses an ignore-list rather than terraform-plan.yml's allowlist:
  # lint-global also lints YAML (.github/), JSON, shell and Terraform, so the
  # set of "code-relevant" files is broader than terraform's. We therefore skip
  # only when EVERY changed file is code-unrelated; anything else runs the
  # matrix. Files terraform-plan.yml treats as relevant (src/, terraform/,
  # package*.json) are never in the ignore set, so the two workflows agree.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_matrix: ${{ steps.detect.outputs.run_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect if lint/test matrix is needed
        id: detect
        run: |
          # For PRs, compare against master; for master pushes, diff the commit.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin master:master
            CHANGED_FILES=$(git diff --name-only master...${{ github.event.pull_request.head.sha }})
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD^..HEAD)
            else
              CHANGED_FILES=$(git diff --name-only $(git hash-object -t tree /dev/null)..HEAD)
            fi
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Code-unrelated files: documentation, Claude config (skills/agents),
          # and IDE config. A PR touching only these skips the matrix.
          CODE_UNRELATED='(\.md$|^\.claude/|^\.vscode/|^\.devcontainer/)'
          RELEVANT=$(echo "$CHANGED_FILES" | grep -vE "$CODE_UNRELATED" || true)

          if [ -z "$CHANGED_FILES" ]; then
            # No detectable changes: run the matrix (safe default).
            echo "run_matrix=true" >> $GITHUB_OUTPUT
            echo "ℹ️  No changed files detected - running matrix as a safe default"
          elif [ -z "$RELEVANT" ]; then
            echo "run_matrix=false" >> $GITHUB_OUTPUT
            echo "⏭️  Only code-unrelated files changed - skipping lint/test matrix"
          else
            echo "run_matrix=true" >> $GITHUB_OUTPUT
            echo "✅ Code-relevant files changed - running lint/test matrix"
          fi

  lint-functions:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.run_matrix == 'true'
    env:
      # Reduced from 4096MB: type checking disabled for test files + .eslintignore reduces file set
      NODE_OPTIONS: --max-old-space-size=2048
    strategy:
      matrix:
        function:
          [
            doc-processor,
            drive-scanner,
            file-classifier,
            notification-dispatcher,
            text-firebase-writer,
            text-vision-processor,
          ]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared library
        run: npm run build --workspace=src/shared

      - name: Build ${{ matrix.function }}
        run: npm run build --workspace=src/functions/${{ matrix.function }}

      - name: Run TypeScript linter for ${{ matrix.function }}
        run: npm run lint --workspace=src/functions/${{ matrix.function }}

  lint-global:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.run_matrix == 'true'
    env:
      # Reduced from 4096MB: still needs more memory for Terraform + multi-tool linting
      NODE_OPTIONS: --max-old-space-size=3072

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install shellcheck, shfmt and yamllint
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y shellcheck shfmt yamllint

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.50.3

      - name: Run YAML linter
        run: yamllint .github/ -c .yamllint.yml

      - name: Run JSON linter
        run: npx eslint '**/*.json'

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

      - name: Run shfmt
        run: shfmt -d scripts/*.sh

      - name: Run Terraform linter
        run: npm run lint:terraform

      - name: Run Terraform validation (no backend)
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Check code formatting
        run: |
          npm run format
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code formatting issues found. Please run 'npm run format' locally."
            git status --porcelain
            git diff
            exit 1
          fi

  test-functions:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-functions, lint-global]
    if: needs.detect-changes.outputs.run_matrix == 'true'
    env:
      # Reduced from 4096MB: Jest workerIdleMemoryLimit prevents memory leaks
      NODE_OPTIONS: --max-old-space-size=2048
    strategy:
      matrix:
        function:
          [
            doc-processor,
            drive-scanner,
            file-classifier,
            notification-dispatcher,
            text-firebase-writer,
            text-vision-processor,
          ]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests for ${{ matrix.function }}
        run: npm test --workspace=src/functions/${{ matrix.function }}

      - name: Run coverage for ${{ matrix.function }}
        id: coverage
        run: npm run test:coverage --workspace=src/functions/${{ matrix.function }}
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: ${{ matrix.function }}
          name: codecov-${{ matrix.function }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Fail if coverage thresholds not met
        if: steps.coverage.outcome == 'failure'
        run: exit 1

  # Required status check. Always runs so it can report success even when the
  # lint/test matrix is skipped for a code-unrelated PR (a bare `paths-ignore`
  # would leave this required check perpetually pending and block merges).
  test:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-functions, lint-global, test-functions]
    if: always()
    steps:
      - name: Aggregate matrix results
        run: |
          if [ "${{ needs.detect-changes.outputs.run_matrix }}" != "true" ]; then
            echo "⏭️  Code-unrelated PR - lint/test matrix skipped, reporting success"
            exit 0
          fi

          if [ "${{ needs.lint-functions.result }}" != "success" ] || \
             [ "${{ needs.lint-global.result }}" != "success" ] || \
             [ "${{ needs.test-functions.result }}" != "success" ]; then
            echo "❌ One or more lint/test jobs did not succeed"
            echo "  lint-functions: ${{ needs.lint-functions.result }}"
            echo "  lint-global:    ${{ needs.lint-global.result }}"
            echo "  test-functions: ${{ needs.test-functions.result }}"
            exit 1
          fi

          echo "✅ All tests and coverage checks completed successfully"

  trigger-terraform-plan:
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      (github.event_name == 'pull_request' &&
       (github.event.pull_request.user.login == 'kohtaka-bot[bot]' ||
        github.event.pull_request.user.login == github.repository_owner)) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
    steps:
      - name: Trigger Terraform Plan workflow
        uses: actions/github-script@v8
        with:
          script: |
            const isPR = context.eventName === 'pull_request';
            const inputs = {};
            let targetRef = 'master';

            if (isPR) {
              inputs.pr_number = context.payload.pull_request.number.toString();
              inputs.pr_ref = context.payload.pull_request.head.ref;
              inputs.pr_sha = context.payload.pull_request.head.sha;
              targetRef = context.payload.pull_request.head.ref;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'terraform-plan.yml',
              ref: targetRef,
              inputs: inputs
            });

            console.log(`Triggered Terraform Plan workflow for ${isPR ? 'PR #' + inputs.pr_number : 'master push'}`);
